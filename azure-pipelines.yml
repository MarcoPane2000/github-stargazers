trigger:
  - main

pool:
  vmImage: 'ubuntu-latest'

variables:
  buildConfiguration: 'Release'
  azureWebAppName: 'github-stargazers-webapi'
  webApiProject: 'src/backend/GitHubStargazers.WebApi/*.csproj'
  testProject: 'src/backend/GitHubStargazers.Tests/*.csproj'

stages:
- stage: BuildAndTest
  displayName: 'Build, Test and Publish'
  jobs:
  - job: BuildJob
    steps:
    - task: UseDotNet@2
      displayName: 'Installa .NET 10 SDK'
      inputs:
        packageType: 'sdk'
        version: '10.x'

    # Tests
    - task: DotNetCoreCLI@2
      displayName: 'Execute XUnit Tests'
      inputs:
        command: 'test'
        projects: '$(testProject)'
        arguments: '--configuration $(buildConfiguration)'

    # Publish WebApi
    - task: DotNetCoreCLI@2
      displayName: 'Compile And Publish WebApi'
      inputs:
        command: 'publish'
        publishWebProjects: false
        projects: '$(webApiProject)'
        arguments: '--configuration $(buildConfiguration) --output $(Build.ArtifactStagingDirectory)'
        zipAfterPublish: true

    # Save artifact
    - task: PublishBuildArtifacts@1
      displayName: 'Save Artifact'
      inputs:
        PathtoPublish: '$(Build.ArtifactStagingDirectory)'
        ArtifactName: 'drop'

# deploy to Azure if tests pass
- stage: Deploy
  displayName: 'Azure Deploy Fase'
  dependsOn: BuildAndTest
  condition: succeeded()
  jobs:
  - job: DeployJob
    steps:
    - task: DownloadBuildArtifacts@0
      inputs:
        buildType: 'current'
        downloadType: 'single'
        artifactName: 'drop'
        downloadPath: '$(System.ArtifactsDirectory)'

    - task: AzureRmWebAppDeployment@4
      displayName: 'Azure App Service Deploy'
      inputs:
        ConnectionType: 'AzureRM'
        azureSubscription: -- todo
        appType: 'webAppLinux'
        WebAppName: '$(azureWebAppName)'
        packageForLinux: '$(System.ArtifactsDirectory)/drop/**/*.zip'